judge:
  model: sonnet
  temperature: 0.1
  rubric:
    accuracy: 0.4
    completeness: 0.4
    conciseness: 0.2

packs:
  - ./eval-packs/python-quick.yaml

settings:
  parallel: 8
  timeout_ms: 300000
  retry_on_failure: false

output:
  dir: ./results
  format: json
