name: "Verdict Stress Test"

models:
  - id: qwen7b
    provider: ollama
    model: "qwen2.5:7b"
    timeout_ms: 90000
    max_tokens: 1024
    tags: [local, test]

judge:
  model: qwen7b
  blind: false

packs:
  - ./eval-packs/stress-test.yaml

run:
  concurrency: 1
  retries: 0
  cache: false

output:
  dir: ./results
  formats: [json, markdown]
