<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Evals — Verdict</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  body { font-family: 'Inter', sans-serif; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  
  .badge-a { background: #EFF6FF; color: #1D4ED8; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  .badge-b { background: #ECFDF5; color: #065F46; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  .badge-c { background: #FFFBEB; color: #92400E; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  
  .card { background: white; border-radius: 0.75rem; border: 1px solid #E5E7EB; padding: 2rem; margin-top: 2rem; }
  
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  details[open] summary .chevron { transform: rotate(180deg); }
  .chevron { transition: transform 0.2s; display: inline-block; }
  
  tr:hover { background: #F9FAFB; }
  
  @media print { .no-print { display: none; } }
</style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="overflow-x-auto">

            <th class="pb-3 pr-4 font-semibold">Model</th>
            <th class="pb-3 pr-4 text-right font-semibold">Score</th>

            <th class="pb-3 pr-4 text-right font-semibold">Complete</th>
            <th class="pb-3 pr-4 text-right font-semibold">Concise</th>

            <th class="pb-3 text-right font-semibold">Latency</th>

        </thead>
        <tbody class="divide-y divide-gray-100">

            <td class="py-3 pr-4 font-bold text-gray-900">1</td>

  <!-- Test Cases -->
  <section class="card">

    <div class="space-y-4">

  </section>

</div>

</html>
