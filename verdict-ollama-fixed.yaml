name: "Ollama — qwen3:235b vs llama3.3:70b"

models:
  - id: qwen3-235b
    provider: ollama          # resolves to http://localhost:11434/v1 automatically
    model: "qwen3:235b"
    timeout_ms: 300000        # 5 min — schema default is 120s, too tight for 235B
    max_tokens: 1024
    tags: [local, ollama, large, moe]

  - id: llama3-70b
    provider: ollama
    model: "llama3.3:70b"
    timeout_ms: 240000        # 4 min
    max_tokens: 1024
    tags: [local, ollama, large]

  # Judge model — fast cloud call so it doesn't block between cases.
  # Also appears in results as a cloud baseline (bonus comparison).
  # Remove if you want a local-only run and change judge.model to qwen3-235b.
  - id: sonar-pro
    base_url: "https://api.perplexity.ai"
    api_key: "${PERPLEXITY_API_KEY}"
    model: "sonar-pro"
    timeout_ms: 30000
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00
    tags: [cloud, perplexity, judge]

judge:
  model: sonar-pro            # Fast cloud judge — Ollama GPU stays free for inference
  blind: true
  rubric:
    accuracy: 0.4
    completeness: 0.4
    conciseness: 0.2

packs:
  - ./eval-packs/general.yaml
  - ./eval-packs/reasoning.yaml

run:
  concurrency: 1              # REQUIRED for Ollama. With concurrency >1, model B starts
                              # its timeout clock while waiting for model A — exhausts
                              # its 2-min window before it even starts generating.
  retries: 1                  # Was 2 — each retry burns full timeout. Keep low.
  cache: true

output:
  dir: ./results
  formats: [json, markdown]
