name: Regenerate Dashboard

# Triggers whenever a bot contributes a new result via `verdict contribute`
on:
  push:
    branches: [main]
    paths:
      - 'dashboard/published/*.json'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build verdict
        run: npm run build

      - name: Backup dashboard before regeneration
        run: |
          chmod +x scripts/backup-dashboard.sh
          TRIGGER="pre-regeneration" ./scripts/backup-dashboard.sh
        
      - name: Regenerate complete dashboard (main + runs + models)
        run: |
          COUNT=$(ls dashboard/published/*.json 2>/dev/null | grep -v dashboard-data | wc -l | tr -d ' ')
          echo "Regenerating complete dashboard from $COUNT result files..."
          chmod +x dashboard/build/generate-all.sh
          bash dashboard/build/generate-all.sh
          echo "✅ Complete dashboard regenerated"
          echo "   - Main dashboard (index.html)"
          echo "   - $COUNT run detail pages"
          echo "   - Model detail pages"

      - name: Commit updated dashboard files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(dashboard): regenerate complete dashboard from ${{ github.event.head_commit.message }} [skip ci]"
          file_pattern: "dashboard/published/"
          commit_user_name: "Verdict Dashboard Bot"
          commit_user_email: "bot@verdict.dev"
