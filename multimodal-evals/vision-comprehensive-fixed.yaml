name: Vision Comprehensive Benchmark (Fixed Criteria)
description: Vision understanding - VISION MODELS ONLY
version: "1.1"

cases:
  # Scene Understanding
  - id: scene-beach
    prompt: "Describe the scene in this image in detail."
    image: "multimodal-evals/images/parking.jpg"
    criteria: "Must describe SPECIFIC visual elements actually present in the image. Generic descriptions without visual details score 0."
    category: "scene-understanding"
    scorer: llm
    
  - id: scene-city
    prompt: "What type of environment is shown in this image?"
    image: "multimodal-evals/images/cityscape.jpg"
    criteria: "Must identify the ACTUAL environment type shown. Cannot score if model admits it cannot see the image."
    category: "scene-understanding"
    scorer: llm
    
  - id: scene-nature
    prompt: "Describe the landscape in this image."
    image: "multimodal-evals/images/landscape.jpg"
    criteria: "Must describe SPECIFIC landscape features visible in the image (not generic landscape elements)."
    category: "scene-understanding"
    scorer: llm
  
  # Object Recognition
  - id: object-food
    prompt: "What specific food items can you identify in this image?"
    image: "multimodal-evals/images/food-plate.jpg"
    criteria: "Must name SPECIFIC food items visible in the image. Cannot score if model cannot identify actual items present."
    category: "object-recognition"
    scorer: llm
    
  - id: object-tech
    prompt: "What technology or electronic devices do you see in this image?"
    image: "multimodal-evals/images/technology.jpg"
    criteria: "Must identify SPECIFIC devices visible in THIS image. Listing general tech categories scores 0."
    category: "object-recognition"
    scorer: llm
    
  - id: object-animal
    prompt: "What animal do you see in this image?"
    image: "multimodal-evals/images/animal.jpg"
    criteria: "Must identify the SPECIFIC animal present in the image. Cannot score if model cannot see the image."
    category: "object-recognition"
    scorer: llm
  
  # Detail Detection
  - id: detail-hands
    prompt: "What is the person doing in this image?"
    image: "multimodal-evals/images/cat.jpg"
    criteria: "Must describe the SPECIFIC action/activity shown in the image based on visual evidence."
    category: "detail-detection"
    scorer: llm
    
  - id: detail-count
    prompt: "Count the number of distinct objects visible in this image."
    image: "multimodal-evals/images/apples.jpg"
    criteria: "Must provide a SPECIFIC count based on what is actually visible. Generic responses score 0."
    category: "detail-detection"
    scorer: llm
  
  # Spatial Reasoning
  - id: spatial-composition
    prompt: "Describe the composition and spatial layout of this image."
    image: "multimodal-evals/images/stop-sign.jpg"
    criteria: "Must describe the ACTUAL spatial arrangement in THIS image. Generic composition advice scores 0."
    category: "spatial-reasoning"
    scorer: llm
    
  - id: text-reading
    prompt: "What text can you read in this image?"
    image: "multimodal-evals/images/text-sign.jpg"
    criteria: "Must read SPECIFIC text visible in the image. Admitting inability to see text scores 0."
    category: "ocr"
    scorer: llm
