name: OCR Extraction Test

# Note: This config is a TEMPLATE
# Vision model integration needed for actual testing
# LightOn OCR-2-1B would need custom provider

models:
  # Placeholder - would need vision model provider
  # Example:
  # - id: lighton-ocr
  #   provider: transformers
  #   model: lightonai/LightOnOCR-2-1B
  #   device: mps
  #   tags: [vision, ocr, specialist]
  
  # For now, document the config structure
  - id: placeholder
    provider: ollama
    model: llama3.2-vision:11b  # Has vision capabilities
    base_url: http://localhost:11434/v1
    api_key: none
    tags: [vision, test]

judge:
  model: placeholder
  temperature: 0.1
  rubric:
    accuracy: 0.40      # Text extracted correctly
    structure: 0.30     # Layout/organization preserved
    completeness: 0.30  # All information captured

packs:
  - ./eval-packs/ocr-extraction.yaml

settings:
  parallel: 1
  timeout_ms: 120000  # 2 min per image (vision can be slow)
  retry_on_failure: false

output:
  dir: ./results
  format: json

