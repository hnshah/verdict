name: ARC Challenge (AI2 Reasoning Challenge)
version: 1.0.0
description: ARC benchmark - 20 grade-school science questions requiring reasoning.
cases:
- id: arc-challenge-0001
  description: Science reasoning question
  category: science-reasoning
  prompt: 'An astronomer observes that a planet rotates faster after a meteorite impact.
    Which is the most likely effect of this increase in rotation?


    A) Planetary density will decrease.


    B) Planetary years will become longer.


    C) Planetary days will become shorter.


    D) Planetary gravity will become stronger.'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0002
  description: Science reasoning question
  category: science-reasoning
  prompt: 'A group of engineers wanted to know how different building designs would
    respond during an earthquake. They made several models of buildings and tested
    each for its ability to withstand earthquake conditions. Which will most likely
    result from testing different building designs?


    A) buildings will be built faster


    B) buildings will be made safer


    C) building designs will look nicer


    D) building materials will be cheaper'
  criteria: 'Correct answer: B'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0003
  description: Science reasoning question
  category: science-reasoning
  prompt: 'The end result in the process of photosynthesis is the production of sugar
    and oxygen. Which step signals the beginning of photosynthesis?


    A) Chemical energy is absorbed through the roots.


    B) Light energy is converted to chemical energy.


    C) Chlorophyll in the leaf captures light energy.


    D) Sunlight is converted into chlorophyll.'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0004
  description: Science reasoning question
  category: science-reasoning
  prompt: 'A physicist wants to determine the speed a car must reach to jump over
    a ramp. The physicist conducts three trials. In trials two and three, the speed
    of the car is increased by 20 miles per hour. What is the physicist investigating
    when he changes the speed?


    A) the control


    B) the hypothesis statement


    C) the dependent (responding) variable


    D) the independent (manipulated) variable'
  criteria: 'Correct answer: D'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0005
  description: Science reasoning question
  category: science-reasoning
  prompt: 'An astronaut drops a 1.0 kg object and a 5.0 kg object on the Moon. Both
    objects fall a total distance of 2.0 m vertically. Which of the following best
    describes the objects after they have fallen a distance of 1.0 m?


    A) They have each lost kinetic energy.


    B) They have each gained the same amount of potential energy.


    C) They have each lost the same amount of potential energy.


    D) They have each gained one-half of their maximum kinetic energy.'
  criteria: 'Correct answer: D'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0006
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Devil facial tumor disease (DFTD) is a disease that is decimating the population
    of Tasmanian devils. The disease passes from one animal to another through bites
    and is caused by parasites. The parasites cause cancerous tumors that spread throughout
    an infected animal''s body and kill it. What is the best description of DFTD?


    A) a non-infectious, cell-cycle disease


    B) an infectious, cell-cycle disease


    C) a non-infectious, chronic disease


    D) an infectious, chronic disease'
  criteria: 'Correct answer: B'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0007
  description: Science reasoning question
  category: science-reasoning
  prompt: 'A type of small mammal from the mountain regions of the western United
    States makes its home out of piles of rock. During summer months, the mammal places
    grasses and seeds in protected places in the rock piles. Which of the following
    is the most likely reason for this behavior?


    A) to repare for migration before winter


    B) to provide warmth during the cold winter months


    C) to store food that will be eaten over the winter months


    D) to protect the grasses and seeds from decay before winter'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0008
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Petrified palm trees are found in sedimentary rock near glaciers. The presence
    of the petrified palm trees most likely provides evidence for which statement?


    A) There was once more water in the area.


    B) The area was once grassland.


    C) The climate in the area was once tropical.


    D) There are active faults in the area.'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0009
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Farmers in Wyoming were concerned because some of their chickens were being
    preyed upon by hawks that lived in areas around their ranches. The farmers grouped
    together and hunted the hawks until they were no longer in their area. Which would
    most likely happen next?


    A) The chicken population would go down.


    B) Populations of mice and rats would increase.


    C) Another bird of prey would replace the hawk.


    D) The chickens would have a lower rate of disease.'
  criteria: 'Correct answer: B'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0010
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Copper is an element that is used in electrical wires. What is the smallest
    unit of copper that still maintains the characteristics of copper?


    A) the atom


    B) the electron


    C) the nucleus


    D) the proton'
  criteria: 'Correct answer: A'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0011
  description: Science reasoning question
  category: science-reasoning
  prompt: 'According to cell classification, prokaryotic cells are separated from
    eukaryotic cells. Which feature is often used to distinguish prokaryotic cells
    from eukaryotic cells?


    A) life processes


    B) size differences


    C) plasma membranes


    D) energy molecules'
  criteria: 'Correct answer: B'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0012
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Which statement best describes the effect of the Sun on the oceans?


    A) The Sun influences the formation of waves.


    B) The Sun creates water particles.


    C) The Sun''s rays cause organisms to come to the surface.


    D) The Sun provides minerals.'
  criteria: 'Correct answer: A'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0013
  description: Science reasoning question
  category: science-reasoning
  prompt: 'The morning temperature in a city is 41°F. If a sunny, mild day is forecast,
    which temperature is most likely for 2:00 p.m.?


    A) 32° F


    B) 41° F


    C) 78° F


    D) 98° F'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0014
  description: Science reasoning question
  category: science-reasoning
  prompt: 'A class plans an investigation to see which brand of light bulb lasts the
    longest. Which of these steps should come first?


    A) Repeat the investigation.


    B) Write a report of the results.


    C) Make a table for recording data.


    D) Make daily observations of the light bulbs.'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0015
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Which of these gases is the most abundant greenhouse gas in the lower atmosphere
    of Earth?


    A) ozone


    B) methane


    C) water vapor


    D) carbon dioxide'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0016
  description: Science reasoning question
  category: science-reasoning
  prompt: 'At which temperature does water freeze?


    A) 0 degrees Celsius


    B) 32 degrees Celsius


    C) 100 degrees Celsius


    D) 212 degrees Celsius'
  criteria: 'Correct answer: A'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0017
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Fossil bones and teeth of dinosaurs have been researched for the last century.
    Recent discoveries of fossilized dinosaurs have also revealed details of soft
    tissues, such as skin. Which is best for a scientist to do when reporting research
    on dinosaurs now?


    A) exclude research on teeth or bones


    B) predict what the next discovery will be


    C) analyze new data as it becomes available


    D) delete earlier reports that were missing the new findings'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0018
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Molly was making iced tea by putting tea bags in boiling water. She needed
    to cool the hot tea quickly, so she poured it into a pitcher full of ice. Which
    best describes the flow of thermal energy?


    A) from the ice to the tea


    B) from the tea to the ice


    C) from the pitcher to the tea


    D) from the ice to the pitcher'
  criteria: 'Correct answer: B'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0019
  description: Science reasoning question
  category: science-reasoning
  prompt: 'Logging companies cut trees in a forest and send the trees to lumber mills
    far from the forest. The mills make boards that are used for construction. Some
    logging companies do not plant tree seedlings after cutting trees. Not planting
    tree seedlings might affect people who need boards in the future because


    A) the price of boards will increase


    B) the price of boards will decrease


    C) there will be more boards available


    D) there will be more trees for logging'
  criteria: 'Correct answer: A'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
- id: arc-challenge-0020
  description: Science reasoning question
  category: science-reasoning
  prompt: 'It was once thought that living organisms could come from non-living matter.
    For example, people believed that flies would develop from rotting meat. This
    idea was later disproved primarily because of


    A) the discovery of the atom.


    B) better surgical techniques.


    C) continued experimentation.


    D) the invention of the microscope.'
  criteria: 'Correct answer: C'
  tags:
  - arc
  - science
  - reasoning
  - multiple-choice
