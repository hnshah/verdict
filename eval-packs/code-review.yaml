name: code-review
description: Evaluate how well a model reviews code and identifies bugs
cases:
- id: review-closure-bug
  category: code-review
  tags:
  - javascript
  - bug
  - closure
  prompt: "Review this JavaScript code and return JSON:\n```javascript\nfor (var i\
    \ = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 100);\n}\n```\nExpected\
    \ bugs: closure / var hoisting\n"
  criteria: Identifies var/closure bug in setTimeout loop. Mentions that var is function-scoped
    and all callbacks share the same i, printing 5 three times. Suggests using let
    or an IIFE.
- id: review-null-ptr
  category: code-review
  tags:
  - javascript
  - bug
  - null-check
  prompt: "Review this JavaScript code and return JSON:\n```javascript\nfunction getName(user)\
    \ {\n  return user.profile.name;\n}\n```\nExpected bugs: null/undefined access\
    \ on user or profile\n"
  criteria: Identifies that user.profile.name will throw if user or profile is null/undefined.
    Suggests optional chaining (?.) or guard checks.
- id: review-sql-injection
  category: code-review
  tags:
  - security
  - sql
  - injection
  prompt: "Review this Python code and return JSON:\n```python\ndef get_user(user_id):\n\
    \    query = f\"SELECT * FROM users WHERE id = {user_id}\"\n    cursor.execute(query)\n\
    \    return cursor.fetchone()\n```\nExpected bugs: SQL injection vulnerability\n"
  criteria: Identifies SQL injection via f-string interpolation in query. Suggests
    using parameterized queries with ? or %s placeholders.
- id: review-race-condition
  category: code-review
  tags:
  - go
  - concurrency
  - race
  prompt: "Review this Go code and return JSON:\n```go\nfunc main() {\n    var wg\
    \ sync.WaitGroup\n    for i := 0; i < 5; i++ {\n        wg.Add(1)\n        go\
    \ func() {\n            defer wg.Done()\n            fmt.Println(i)\n        }()\n\
    \    }\n    wg.Wait()\n}\n```\nExpected bugs: closure variable capture of loop\
    \ counter\n"
  criteria: 'Identifies Go closure capturing loop variable i. All goroutines print
    5. Fix: pass i as an argument to the goroutine function.'
- id: review-mutating-input
  category: code-review
  tags:
  - python
  - mutation
  - side-effect
  prompt: "Review this Python code and return JSON:\n```python\ndef process_items(items):\n\
    \    for item in items:\n        if item.active:\n            items.remove(item)\n\
    \    return items\n```\nExpected bugs: modifying list while iterating\n"
  criteria: Identifies modifying list while iterating causes items to be skipped.
    Suggests building a new list with list comprehension or filtering first.
- id: review-resource-leak
  category: code-review
  tags:
  - python
  - resource
  - leak
  prompt: "Review this Python code and return JSON:\n```python\ndef read_config(path):\n\
    \    f = open(path, 'r')\n    return json.load(f)\n```\nExpected bugs: file handle\
    \ not closed / not using context manager\n"
  criteria: Identifies file handle leak — file opened but never closed. Suggests using
    with/open statement or explicit close in finally.
- id: review-timing-attack
  category: code-review
  tags:
  - security
  - timing
  - crypto
  prompt: "Review this Python code and return JSON:\n```python\ndef check_password(plain,\
    \ hashed):\n    return bcrypt.hash(plain) == hashed\n```\nExpected bugs: timing\
    \ attack / comparing hashes with == instead of bcrypt.compare\n"
  criteria: Identifies bcrypt.hash used instead of bcrypt.compare for password checking
    causes timing attack vulnerability. Suggests bcrypt.checkpw or bcrypt.compare.
- id: review-deadlock
  category: code-review
  tags:
  - go
  - concurrency
  - deadlock
  prompt: "Review this Go code and return JSON:\n```go\nfunc transfer(a, b *Account,\
    \ amount int, ch chan bool) {\n    <-ch  // wait\n    a.Lock()\n    b.Lock()\n\
    \    // transfer\n    a.Unlock()\n    b.Unlock()\n    ch <- true\n}\n```\nExpected\
    \ bugs: potential deadlock / inconsistent lock ordering\n"
  criteria: 'Identifies potential deadlock from inconsistent lock ordering between
    transfer() calls on two accounts. Fix: always lock in consistent order.'
- id: review-shallow-equal
  category: code-review
  tags:
  - javascript
  - equality
  - comparison
  prompt: 'Review this JavaScript code and return JSON:

    ```javascript

    const a = { x: 1 };

    const b = { x: 1 };

    console.log(a == b, a === b);

    ```

    Expected bugs: using == or === for object comparison (only false)

    '
  criteria: Correctly identifies that both == and === return false for distinct object
    comparison. Explains this is reference equality, not value equality.
- id: review-floating-point
  category: code-review
  tags:
  - python
  - floating-point
  - precision
  prompt: "Review this Python code and return JSON:\n```python\ndef calc_tax(price):\n\
    \    tax = price * 0.08\n    return round(tax, 2)\n\nprint(calc_tax(0.1 + 0.2))\n\
    ```\nExpected bugs: floating point precision error\n"
  criteria: Identifies floating point precision error — (0.1 + 0.2) does not equal
    0.3 in binary float. Suggests Decimal class or storing cents as integers.
- id: review-auth-bypass
  category: code-review
  tags:
  - security
  - auth
  - logic
  prompt: "Review this Python code and return JSON:\n```python\ndef is_admin(user):\n\
    \    if user.get('is_admin'):\n        return True\n    return check_db(user.id)\n\
    \ndef delete_user(user_id, current_user):\n    if is_admin(current_user):\n  \
    \      db.delete(user_id)\n```\nExpected bugs: logic error in is_admin / IDOR\
    \ potential\n"
  criteria: 'Identifies IDOR: is_admin() has a bypass path (returns True for is_admin=True
    in dict without DB check) AND delete_user does not verify target user. Two separate
    auth bugs.'
- id: review-error-swallow
  category: code-review
  tags:
  - python
  - error-handling
  - exception
  prompt: "Review this Python code and return JSON:\n```python\ntry:\n    result =\
    \ risky_operation(data)\nexcept Exception:\n    pass\nreturn default_value\n```\n\
    Expected bugs: swallowing all exceptions / losing error information\n"
  criteria: Identifies that bare except:pass loses all error information. Suggests
    logging the exception or reraising with raise from.
- id: review-n-plus-1
  category: code-review
  tags:
  - python
  - sql
  - performance
  prompt: "Review this Python code and return JSON:\n```python\ndef get_all_users_with_posts():\n\
    \    users = db.query(\"SELECT * FROM users\")\n    for user in users:\n     \
    \   user['posts'] = db.query(f\"SELECT * FROM posts WHERE user_id = {user['id']}\"\
    )\n    return users\n```\nExpected bugs: N+1 query problem / SQL injection in\
    \ second query\n"
  criteria: 'Identifies N+1 query: first query gets all users then loop queries posts
    one by one. Also SQL injection in the f-string query. Fix: use JOIN for both.'
- id: review-oob-access
  category: code-review
  tags:
  - python
  - security
  - out-of-bounds
  prompt: "Review this Python code and return JSON:\n```python\ndef get_window(items,\
    \ start, length):\n    return items[start:start + length]\n```\nExpected bugs:\
    \ no bounds checking on start / potential negative index or overflow\n"
  criteria: Identifies missing bounds checking on start index — negative values or
    start+length exceeding array length will crash or return wrong slice. Suggests
    explicit bounds validation.
- id: review-hardcoded-secret
  category: code-review
  tags:
  - security
  - secrets
  - api-key
  prompt: "Review this Python code and return JSON:\n```python\nAPI_KEY = \"sk-abc123xyz789supersecretkey\"\
    \n\ndef send_message(text):\n    headers = { \"Authorization\": f\"Bearer {API_KEY}\"\
    \ }\n    return requests.post(WEBHOOK_URL, data={\"text\": text}, headers=headers)\n\
    ```\nExpected bugs: hardcoded API key / secrets in source code\n"
  criteria: Identifies hardcoded API key in source code. Suggests using environment
    variables, .env files, or a secret manager like AWS Secrets Manager.
- id: review-log-injection
  category: code-review
  tags:
  - security
  - logging
  - injection
  prompt: "Review this Python code and return JSON:\n```python\ndef log_request(user_input):\n\
    \    log_file.write(f\"[USER INPUT] {user_input}\\n\")\n\nlog_request(request.args.get('name',\
    \ ''))\n```\nExpected bugs: log injection / unsanitized user input in logs\n"
  criteria: Identifies unsanitized user input written directly to logs — potential
    log injection. Attacker could forge log entries. Suggests input sanitization or
    structured logging.
- id: review-crypto-weak
  category: code-review
  tags:
  - python
  - security
  - cryptography
  prompt: "Review this Python code and return JSON:\n```python\nimport hashlib\n\n\
    def hash_password(password):\n    return hashlib.md5(password.encode()).hexdigest()\n\
    ```\nExpected bugs: MD5 for passwords (too weak) / should use bcrypt or argon2\n"
  criteria: Identifies MD5 is cryptographically broken and should never be used for
    password hashing. Suggests bcrypt, scrypt, argon2, or PBKDF2.
- id: review-path-traversal
  category: code-review
  tags:
  - security
  - file
  - path-traversal
  prompt: "Review this Python code and return JSON:\n```python\ndef serve_file(filename):\n\
    \    path = os.path.join(SAFE_DIR, filename)\n    return open(path).read()\n```\n\
    Expected bugs: path traversal vulnerability / no validation of filename\n"
  criteria: 'Identifies path traversal: attacker can use ../../../etc/passwd to escape
    SAFE_DIR. Suggests using os.path.basename(), path validation, or chroot jail.'
