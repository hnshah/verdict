name: Customer Support
description: Test models on empathy, problem-solving, and professional communication

cases:
  - prompt: |
      Customer message: "I've been waiting 3 days for my order. This is unacceptable. I need it by tomorrow for my daughter's birthday. What are you going to do about it?"
      
      Draft a response.
    expected: Should acknowledge frustration, show empathy, provide specific solution, offer compensation if appropriate, personal touch about daughter's birthday

  - prompt: |
      Customer: "Your app deleted all my data! I've lost months of work. This is a disaster!"
      
      First response draft:
    expected: Should validate concern immediately, ask for specific details to investigate, offer immediate escalation, show urgency, avoid defensive language

  - prompt: |
      Customer: "I don't understand how to use [feature]. The documentation is confusing."
      
      Response:
    expected: Should apologize for confusion, provide step-by-step guidance, offer to improve docs based on their feedback, maybe schedule call if complex

  - prompt: |
      Customer (clearly upset): "I've been a loyal customer for 5 years and you're raising prices by 30%? That's insulting."
      
      How do you respond?
    expected: Should acknowledge loyalty explicitly, explain pricing decision context, offer options (grandfather pricing, payment plan), show appreciation

  - prompt: |
      Customer: "When will [highly requested feature] be available? I've been asking for 6 months."
      
      You don't have a timeline. Draft response:
    expected: Should be honest about uncertainty, explain prioritization factors, offer workaround if possible, invite to beta/feedback when available

  - prompt: |
      Customer: "I want to cancel my subscription. Your product doesn't work."
      
      Response:
    expected: Should ask what specifically isn't working, offer to help solve problem first, if still canceling make it easy and leave door open for return

  - prompt: |
      Customer: "One of your support reps was incredibly rude to me yesterday. I want to speak to a manager."
      
      Response (you are the manager):
    expected: Should apologize immediately, ask for details, commit to investigation, offer direct contact info, follow up action plan

  - prompt: |
      Customer: "I love your product! Can you add [specific feature]?"
      
      Draft response:
    expected: Should thank them enthusiastically, explain how feature requests are prioritized, invite them to detailed feedback session, show their voice matters
