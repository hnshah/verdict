name: CLI Building Benchmark - Local Models

models:
  # Winner from Army test
  - id: qwen3-coder-30b
    provider: ollama
    model: qwen3-coder:30b
    base_url: http://localhost:11434/v1
    api_key: none
    tags: [local, xlarge, coding, specialist]
  
  # Runner-up from Army test
  - id: phi4-14b
    provider: ollama
    model: phi4:14b
    base_url: http://localhost:11434/v1
    api_key: none
    tags: [local, large, microsoft]
  
  # Strong performer
  - id: qwen2.5-coder-14b
    provider: ollama
    model: qwen2.5-coder:14b
    base_url: http://localhost:11434/v1
    api_key: none
    tags: [local, large, coding]
  
  # Fast baseline
  - id: qwen2.5-7b
    provider: ollama
    model: qwen2.5:7b
    base_url: http://localhost:11434/v1
    api_key: none
    tags: [local, medium, fast]
  
  # API comparison
  - id: haiku
    provider: openclaw
    model: anthropic/claude-haiku-4-5
    agent_id: ren
    tags: [api, fast]

judge:
  model: haiku
  temperature: 0.1
  rubric:
    accuracy: 0.4      # Does it work correctly?
    completeness: 0.4  # All requirements met?
    conciseness: 0.2   # Clean, minimal code?

packs:
  - ./eval-packs/cli-building.yaml

settings:
  parallel: 3
  timeout_ms: 180000
  retry_on_failure: false

output:
  dir: ./results
  format: json
