name: "OSS Contribution - Real Work Comparison"

models:
  - id: qwen7b
    provider: ollama
    model: "qwen2.5:7b"
    timeout_ms: 120000
    max_tokens: 2048
    tags: [local, medium, oss]

  - id: llama32-3b
    provider: ollama
    model: "llama3.2:3b"
    timeout_ms: 120000
    max_tokens: 2048
    tags: [local, small, fast]

  - id: qwen14b
    provider: ollama
    model: "qwen2.5:14b"
    timeout_ms: 180000
    max_tokens: 2048
    tags: [local, large, quality]

judge:
  model: qwen14b
  blind: true
  rubric:
    accuracy: 0.4
    completeness: 0.4
    conciseness: 0.2

packs:
  - ./eval-packs/oss-contribution.yaml

run:
  concurrency: 1
  retries: 0
  cache: true

output:
  dir: ./results
  formats: [json, markdown]
