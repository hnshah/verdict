name: Quick Model Comparison (3 cases)

models:
  - id: qwen-local
    provider: ollama
    model: qwen2.5-coder:7b
    base_url: http://localhost:11434/v1
    api_key: none
  
  - id: haiku
    provider: openclaw
    model: anthropic/claude-haiku-4-5
    agent_id: ren
  
  - id: sonnet
    provider: openclaw
    model: anthropic/claude-sonnet-4-5
    agent_id: ren

judge:
  model: sonnet

packs:
  - ./eval-packs/python-quick.yaml

settings:
  parallel: 3
  timeout_ms: 120000
