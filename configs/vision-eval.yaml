version: "1.0"
name: "Vision Comprehensive Benchmark"

models:
  - id: llava-13b
    provider: ollama
    model: llava:13b
    timeout_ms: 180000
    max_tokens: 512
    
  - id: phi4
    provider: ollama
    model: phi4:14b
    timeout_ms: 60000
    max_tokens: 1024
    
judge:
  model: phi4
  blind: true
  rubric:
    accuracy: 0.5
    completeness: 0.3
    conciseness: 0.2

run:
  concurrency: 1
  retries: 1
  cache: false

output:
  dir: ./results
  formats: [json, markdown]
  delta: true

settings:
  auto_contribute: true
  contribution_author: "Ren (Multimodal Vision Evals - 256GB)"
