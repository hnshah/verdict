name: "Comprehensive Stress Test - ALL PACKS"

models:
  - id: qwen7b
    provider: ollama
    model: "qwen2.5:7b"
    timeout_ms: 120000
    max_tokens: 2048
    tags: [local, primary]

judge:
  model: qwen7b
  blind: false
  rubric:
    accuracy: 0.4
    completeness: 0.4
    conciseness: 0.2

packs:
  - ./eval-packs/quick-test.yaml
  - ./eval-packs/tool-test.yaml
  - ./eval-packs/tool-edge-cases.yaml
  - ./eval-packs/stress-test.yaml
  - ./eval-packs/extreme-edge-cases.yaml
  - ./eval-packs/oss-contribution.yaml
  - ./eval-packs/code-generation.yaml
  - ./eval-packs/reasoning.yaml

run:
  concurrency: 1
  retries: 0
  cache: true

output:
  dir: ./results
  formats: [json, markdown]
