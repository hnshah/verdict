name: Elite Python Assessment (Production-Grade)

models:
  # Top contenders only
  - id: sonnet
    provider: openclaw
    model: anthropic/claude-sonnet-4-5
    agent_id: ren
    tags: [elite, reasoning]
  
  - id: gpt4
    provider: openclaw
    model: openai/gpt-4-turbo
    agent_id: ren
    tags: [elite, openai]

judge:
  model: sonnet
  temperature: 0.0
  rubric:
    accuracy: 0.35
    completeness: 0.35
    conciseness: 0.15
    # Elite criteria (professional standards)

packs:
  - ./eval-packs/python-elite.yaml

settings:
  parallel: 1  # Sequential for elite (complex tasks)
  timeout_ms: 300000  # 5 min per task
  retry_on_failure: false

output:
  dir: ./results
  format: json
