name: "Model Comparison Test"

models:
  - id: qwen7b
    provider: ollama
    model: "qwen2.5:7b"
    timeout_ms: 60000
    max_tokens: 512
    tags: [local, medium]

  - id: llama32-3b
    provider: ollama
    model: "llama3.2:3b"
    timeout_ms: 60000
    max_tokens: 512
    tags: [local, small]

judge:
  model: qwen7b
  blind: true

packs:
  - ./eval-packs/quick-test.yaml

run:
  concurrency: 1
  retries: 0

output:
  dir: ./results
  formats: [json, markdown]
