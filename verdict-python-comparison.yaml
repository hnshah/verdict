name: Python Coding Comparison - Local vs API

models:
  # Local via Ollama
  - id: qwen-local
    provider: ollama
    model: qwen2.5-coder:7b
    base_url: http://localhost:11434/v1
    api_key: none
    tags: [local, coding]
  
  # API via OpenClaw
  - id: haiku-openclaw
    provider: openclaw
    model: anthropic/claude-haiku-4-5
    agent_id: ren
    tags: [openclaw, fast]

judge:
  model: haiku-openclaw
  temperature: 0.1
  rubric:
    accuracy: 0.4
    completeness: 0.4
    conciseness: 0.2

packs:
  - ./eval-packs/python-quick.yaml

settings:
  parallel: 2
  timeout_ms: 120000
  retry_on_failure: false

output:
  dir: ./results
  format: json
